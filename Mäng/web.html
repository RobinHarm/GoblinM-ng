<!DOCTYPE html>
<html>
<head>
    <title>game</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <body>
    
<h1>ROBINI MORVAKAMBER</h1>
<p>tapa robin</p>



<p id = "name"></p>
<p id = "health"></p>
<p id = "gold"></p>
<p id = "potion"></p>
<p id = "damage"></p>

<p id = "picture"></p>
<p id = "enemy_health"></p>
<a href="shop.html">shop</a>


<button onclick="attack()">attack</button>
<button onclick="healing()">heal</button>
<button onclick="next()">next</button>


<div id="list"></div>
</body>
<script>
let max_health;
let start_health;
let health;
let start_gold;
let gold;
let damage;
let heal = 1;
let enemy_health = 3;
let start_potion;
let potion;
let r;
let a;



//------------------------------------------------------------------------
//character info
const params = new URLSearchParams(window.location.search);

const isNewGame = params.get("new") === "true";
const name = params.get("cname");
const classChoice = params.get("class_choice");

if (name && classChoice) 
{
    localStorage.setItem("name", name);
    localStorage.setItem("class", classChoice);
}


const playerName = localStorage.getItem("name");
const playerClass = localStorage.getItem("class");

if (playerClass == "warrior") 
{
    start_health = 20;
    max_health = 40;
    start_gold = 20;
    start_potion = 1;
    damage = 2;
}
else if (playerClass == "wizard") 
{
    start_health = 10;
    max_health = 20;
    start_gold = 20;
    start_potion = 3;
    damage = 4;
}
else if (playerClass == "thief") 
{
    start_health = 20;
    max_health = 30;
    start_gold = 40;
    start_potion = 2;
    damage = 3;
}
//------------------------------------------------------------------------
//item info
if (isNewGame) {
    health = start_health;
    gold = start_gold;
    potion = start_potion;
    localStorage.setItem("health", health);
    localStorage.setItem("gold", gold);
    localStorage.setItem("potion", potion);
} else {
    let savedHealth = localStorage.getItem("health");
    let savedGold = localStorage.getItem("gold");
    let savedPotion = localStorage.getItem("potion");

    if (savedHealth !== null) health = parseInt(savedHealth);
    if (savedGold !== null) gold = parseInt(savedGold);
    if (savedPotion !== null) potion = parseInt(savedPotion);
}

//------------------------------------------------------------------------

document.getElementById("picture").innerHTML = '<img src="Piltid/goblin.png" alt="goblin" width = "256" height = "auto"/>';

function updateUI() {
    document.getElementById("name").innerText = "name: " + playerName + " the " + playerClass;
    document.getElementById("health").innerText = "health: " + health;
    document.getElementById("gold").innerText = "gold: " + gold;
    document.getElementById("potion").innerText = "potions: " + potion;
    document.getElementById("damage").innerText = "damage: " + damage;
    document.getElementById("enemy_health").innerText = "enemy health: " + enemy_health;
    
}


let dead = 0;
function attack() 
{
    if (dead == 0) 
    {
        enemy_health -= damage;
        r = Math.random() * 1;
        if (r > 0.66) {enemy_attack(); saveGame();} 
    }

    if (enemy_health <= 0 && dead == 0) 
    {
        switch (rand)
        {
            case 1:
                enemy_health = 0;
                gold += Math.floor((Math.random() * 10) + 1);
                r = Math.random() * 1;
                if (r > 0.50) {potion_get()} 
                dead = 1;
                document.getElementById("picture").innerHTML = '<img src="Piltid/surnud munnikoletis.png" alt="dead cock" width = "256" height = "auto"/>';
                break;
            case 2:
                enemy_health = 0;
                gold += Math.floor((Math.random() * 10) + 1);
                r = Math.random() * 1;
                if (r > 0.50) {potion_get()} 
                dead = 1; 
                document.getElementById("picture").innerHTML = '<img src="Piltid/slime dead.png" alt="dead slime" width = "256" height = "auto"/>';
                break;
            default:
                enemy_health = 0;
                gold += Math.floor((Math.random() * 10) + 1);
                r = Math.random() * 1;
                if (r > 0.50) {potion_get()} 
                dead = 1;
                document.getElementById("picture").innerHTML = '<img src="Piltid/goblinDead.png" alt="dead goblin" width = "256" height = "auto"/>';
                break;
                
        }
        saveGame();
    }
    
    updateUI(); 
}

function healing()
{
    if (potion > 0 && health < max_health) 
    {
        health += (Math.floor(Math.random() * 6) + 5);
        potion -= 1;

        if (health > max_health) {
            health = max_health;
        }

        saveGame(); 
    }
    updateUI();
}

let rand;
function next()
{
    if (dead == 1)
    {
        rand = Math.floor(Math.random() * 3) + 1;
        switch(rand)
        {
            case 1:
                document.getElementById("picture").innerHTML = '<img src="Piltid/munnikoletis.png" alt="cock" width = "256" height = "auto"/>';
                enemy_health = Math.floor(Math.random() * 5) + 1;
                break;
            case 2:
                document.getElementById("picture").innerHTML = '<img src="Piltid/slime.png" alt="slime" width = "256" height = "auto"/>';
                enemy_health = Math.floor(Math.random() * 3) + 1;
                break;
            default:
                document.getElementById("picture").innerHTML = '<img src="Piltid/goblin.png" alt="goblin" width = "256" height = "auto"/>';              
                enemy_health = Math.floor(Math.random() * 9) + 1;
                break;   
        }
        dead = 0;
        updateUI();
    }
}

function enemy_attack()
{
    switch(rand)
    {
        case 1:
            health -= Math.floor(Math.random() * 7) + 1;
            break;
        case 2:
            health -= Math.floor(Math.random() * 2) + 1;
            break;
        default:
            health -= Math.floor(Math.random() * 3) + 1;
            break; 
    }
    saveGame(); 
    updateUI(); 
}

function potion_get()
{
    potion += 1;
    saveGame();
}
updateUI();

function pood()
{
    const ost = JSON.parse(localStorage.getItem("Bought")) || {};

    if (ost["potion"]) 
    {
        potion += ost["potion"];
        saveGame(); 
    }
    if (ost["Health"]) 
    {
        health += ost["Health"];
        saveGame();
    }

    localStorage.removeItem("Bought");
}
pood()
updateUI()

function saveGame() {
    localStorage.setItem("health", health);
    localStorage.setItem("gold", gold);
    localStorage.setItem("potion", potion);
}

</script>

</body>
</html>
