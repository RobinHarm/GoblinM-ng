<!DOCTYPE html>
<html>
<head>
    <title>game</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <body>
    
<h1>ROBINI MORVAKAMBER</h1>
<p>tapa robin</p>



<p id = "name"></p>
<p id = "level"></p>
<p id = "xp"></p>
<p id = "health"></p>
<p id = "mana"></p>
<p id = "gold"></p>
<p id = "potion"></p>
<p id = "damage"></p>

<p id = "picture"></p>
<p id = "enemy_health"></p>


<button onclick="attack()">attack</button><br>
<p id = "ability"></p>
<button onclick="ability()">ability</button><br>
<button onclick="healing()">heal</button><br>
<button onclick="next()">next</button>

<div id="shopLink"></div>


<div id="list"></div>
</body>
<script>
let xp;             let xpNextLevel;    let level;
let max_health;     let start_health;   let health;
let max_mana;       let start_mana;     let mana;
let start_gold;     let gold;
let damage;
let playerAbility;
let enemy_health = 3;
let start_potion;   let potion;
let r;
let a;



//------------------------------------------------------------------------
//character info
const params = new URLSearchParams(window.location.search);

const isNewGame = params.get("new") === "true";
const name = params.get("cname");
const classChoice = params.get("class_choice");

if (name && classChoice) 
{
    localStorage.setItem("name", name);
    localStorage.setItem("class", classChoice);
}


const playerName = localStorage.getItem("name");
const playerClass = localStorage.getItem("class");

if (playerClass == "warrior") 
{
    playerAbility = "rage";
    start_health = 20;
    max_health = 40;
    max_mana = 20;
    start_mana = 20;
    start_gold = 20;
    start_potion = 1;
    damage = 2;
}
else if (playerClass == "wizard") 
{
    playerAbility = "life absorb";
    start_health = 10;
    max_health = 20;
    max_mana = 40;
    start_mana = 40;
    start_gold = 20;
    start_potion = 3;
    damage = 4;
}
else if (playerClass == "thief") 
{
    playerAbility = "steal";
    start_health = 20;
    max_health = 30;
    max_mana = 20;
    start_mana = 20;
    start_gold = 40;
    start_potion = 2;
    damage = 3;
}
//------------------------------------------------------------------------
//item info
if (isNewGame) {
    xp = 0;
    xpNextLevel = 85;
    level = 1;
    health = start_health;
    gold = start_gold;
    potion = start_potion;
    mana = start_mana
    localStorage.setItem("xp", xp);
    localStorage.setItem("xpNextLevel", xpNextLevel);
    localStorage.setItem("level", level);
    localStorage.setItem("health", health);
    localStorage.setItem("gold", gold);
    localStorage.setItem("potion", potion);
    localStorage.setItem("mana", mana);
} else {
    let savedXp = localStorage.getItem("xp");
    let savedXpNextLevel = localStorage.getItem("xpNextLevel");
    let savedLevel = localStorage.getItem("level");
    let savedHealth = localStorage.getItem("health");
    let savedGold = localStorage.getItem("gold");
    let savedPotion = localStorage.getItem("potion");
    let savedMana = localStorage.getItem("mana");

    if (savedXp !== null) xp = parseInt(savedXp);
    if (savedXpNextLevel !== null) xpNextLevel = parseInt(savedXpNextLevel);
    if (savedLevel !== null) level = parseInt(savedLevel);
    if (savedHealth !== null) health = parseInt(savedHealth);
    if (savedGold !== null) gold = parseInt(savedGold);
    if (savedPotion !== null) potion = parseInt(savedPotion);
    if (savedMana !== null) mana = parseInt(savedMana);
}

//------------------------------------------------------------------------

document.getElementById("picture").innerHTML = '<img src="Piltid/goblin.png" alt="goblin" width = "256" height = "auto"/>';

function updateUI() {
    document.getElementById("name").innerText = "name: " + playerName + " the " + playerClass;
    document.getElementById("xp").innerText = "xp: " + xp + "/" + xpNextLevel;
    document.getElementById("level").innerText = "level: " + level;
    document.getElementById("health").innerText = "health: " + health + "/" + max_health;
    document.getElementById("mana").innerText = "mana: " + mana + "/" + max_mana;
    document.getElementById("gold").innerText = "gold: " + gold;
    document.getElementById("potion").innerText = "potions: " + potion;
    document.getElementById("damage").innerText = "damage: " + damage;
    document.getElementById("enemy_health").innerText = "enemy health: " + enemy_health;
    document.getElementById("ability").innerText = "ability: " + playerAbility;
    
}

function LinkShop()
{
    if (dead == 1)
    {
        document.getElementById("shopLink").innerHTML =
            '<a href="shop.html">Mine poodi</a>';
    }

}


let dead = 0;
function attack() 
{
    if (dead == 0) 
    {
        enemy_health -= damage;
        r = Math.random() * 1;
        if (r > 0.33) {enemy_attack(); saveGame();} 
    }

    if (enemy_health <= 0 && dead == 0) 
    {
        enemyDeath();
    }
        
    
    updateUI(); 
}
function enemyDeath()
{
    switch (rand)
        {
            case 1:
                enemy_health = 0;
                gold += Math.floor((Math.random() * 10) + 1);
                xp += Math.floor((Math.random() * 7) + 4);
                dead = 1;
                document.getElementById("picture").innerHTML = '<img src="Piltid/surnud munnikoletis.png" alt="dead cock" width = "256" height = "auto"/>';
                break;
            case 2:
                enemy_health = 0;
                gold += Math.floor((Math.random() * 10) + 1);
                xp += Math.floor((Math.random() * 4) + 2);
                dead = 1; 
                document.getElementById("picture").innerHTML = '<img src="Piltid/slime dead.png" alt="dead slime" width = "256" height = "auto"/>';
                break;
            default:
                enemy_health = 0;
                gold += Math.floor((Math.random() * 10) + 1);
                xp += Math.floor((Math.random() * 6) + 3);
                //r = Math.random() * 1;
                //if (r > 0.50) {potion_get()} 
                dead = 1;
                document.getElementById("picture").innerHTML = '<img src="Piltid/goblinDead.png" alt="dead goblin" width = "256" height = "auto"/>';
                break;
                
        }
        if (mana < max_mana)
        {
            mana += 2;
            if (mana > max_mana)
            {
                mana = max_mana;
            }
        }
    levelup();
    saveGame();
    updateUI(); 
    LinkShop();
}

function healing()
{
    if (potion > 0 && health < max_health) 
    {
        health += (Math.floor(Math.random() * 6) + 5);
        potion -= 1;

        if (health > max_health) {
            health = max_health;
        }

        saveGame(); 
    }
    updateUI();
}

let rand;
function next()
{
    if (dead == 1)
    {
        document.getElementById("shopLink").innerHTML = "";

        rand = Math.floor(Math.random() * 3) + 1;

        if (rand == 1)
        {
            document.getElementById("picture").innerHTML = '<img src="Piltid/munnikoletis.png" width="256"/>';
            enemy_health = Math.floor(Math.random() * 5) + 1;
        }
        else if (rand == 2)
        {
            document.getElementById("picture").innerHTML = '<img src="Piltid/slime.png" width="256"/>';
            enemy_health = Math.floor(Math.random() * 3) + 1;
        }
        else
        {
            document.getElementById("picture").innerHTML = '<img src="Piltid/goblin.png" width="256"/>';              
            enemy_health = Math.floor(Math.random() * 9) + 1;
        }

        dead = 0;
        updateUI();
    }
}

function enemy_attack()
{
    switch(rand)
    {
        case 1:
            health -= Math.floor(Math.random() * 7) + 1;
            break;
        case 2:
            health -= Math.floor(Math.random() * 2) + 1;
            break;
        default:
            health -= Math.floor(Math.random() * 3) + 1;
            break; 
    }
    saveGame(); 
    updateUI(); 
}

function potion_get()
{
    potion += 1;
    saveGame();
}
updateUI();

function pood()
{
    const ost = JSON.parse(localStorage.getItem("Bought")) || {};

    if (ost["potion"]) 
    {
        potion += ost["potion"];
        saveGame(); 
    }
    if (ost["Health"]) 
    {
        health += ost["Health"];
        saveGame();
    }

    localStorage.removeItem("Bought");
}


function saveGame() 
{
    localStorage.setItem("xp", xp);
    localStorage.setItem("xpNextLevel", xpNextLevel);
    localStorage.setItem("level", level);
    localStorage.setItem("health", health);
    localStorage.setItem("mana", mana);
    localStorage.setItem("gold", gold);
    localStorage.setItem("potion", potion);
}

function ability() 
{
    if (playerClass == "warrior") 
    {
        if (enemy_health > 0 && mana >= 10) 
        {
        enemy_health -= 2 * damage
        if (enemy_health <= 0 && dead == 0) 
        {
            enemyDeath();
        }
        mana -= 10;
        }
    }
    else if (playerClass == "wizard") 
    {
        if (health < max_health && dead == 0 && mana >= 10)
        {
            health += Math.ceil(enemy_health / 2)
            enemy_health -= Math.ceil(enemy_health / 2)
            if (enemy_health <= 0 && dead == 0) 
            {
                enemyDeath();
            }
            mana -= 10;
        }
    }
    else if (playerClass == "thief") 
    {
        if (dead == 0 && mana >= 10)
        {
        gold += Math.floor(Math.random() * 10) + 10;
        enemy_health -= 4;
        if (enemy_health <= 0 && dead == 0) 
            {
                enemyDeath();
            }
        mana -= 10;
        }
    }
    updateUI()
}

function levelup()
{
    if (xp >= xpNextLevel)
    {
        level += 1;
        xpNextLevel += Math.ceil(xpNextLevel * 1.1);
        levelup();
    }
}
pood()
updateUI()
</script>

</body>
</html>
